services:
  - type: web
    name: faith-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_PATH
        value: data/faithguide.db
      - key: CHROMA_PATH
        value: data/chromadb
      - key: PORT
        value: 10000
    disk:
      name: faith-data
      mountPath: /app/data
      sizeGB: 1
